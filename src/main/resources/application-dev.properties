spring.application.name=my-ledger-be

# Server
server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=framework

# Base Path
spring.mvc.servlet.path=/myledger-api

# ===============================
# PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://postgres.techseek.in:5432/postgres?currentSchema=ledger&sslmode=prefer
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=ledger

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET:MyLedgerJWTSecretKeyVeryStrongAndSecureForDev2026}
app.jwt.access-expiration-sec=3600
app.jwt.refresh-expiration-sec=604800

# ===============================
# Frontend
# ===============================
app.frontend-url=http://localhost:4200

# ===============================
# Google OAuth
# ===============================
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.google.redirect-uri=http://localhost:8080/myledger-api/auth/google/callback

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:4200
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ===============================
# Mail
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# ===============================
# OTP
# ===============================
app.otp.length=4
app.otp.expiration-min=5

# ===============================
# Upload
# ===============================
app.upload.dir=/usr/local/lib/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB