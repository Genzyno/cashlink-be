spring.application.name=my-ledger-be

# Server
server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=framework
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# API Base Path
spring.mvc.servlet.path=/myledger-api/

# ===============================
# PostgreSQL Database
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.default_schema=ledger
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql=true
spring.jpa.properties.hibernate.id.new_generator_mappings=false
spring.jpa.properties.hibernate.search.autoregister_listeners=false
spring.jpa.properties.hibernate.bytecode.use_reflection_optimizer=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ===============================
# JWT / Security
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-sec=3600
app.jwt.refresh-expiration-sec=604800

# OTP
app.otp.expiration-min=5
app.otp.length=4
app.otp.rate-limit-per-email-per-min=2

# Email Verification
app.email-verification.expiration-hours=24
app.email-verification.rate-limit-per-email-per-hour=3

# Frontend URL
app.frontend.url=https://myledger.techseek.in

# ===============================
# Google OAuth
# ===============================
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.google.redirect-uri=https://myledgerapi.techseek.in/myledger-api/auth/google/callback

spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Optional extra Android audiences
# app.google.additional-audiences=

# ===============================
# Invite
# ===============================
app.invite.expiration-days=7

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=https://myledger.techseek.in
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ===============================
# Mail (Gmail SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
spring.mail.properties.mail.debug=false

# ===============================
# File Upload
# ===============================
app.upload.dir=/usr/local/lib/uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# Disable Auto OAuth2 Client
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration